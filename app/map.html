<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
        />

        <!-- Bootstrap CSS -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
            integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
            crossorigin="anonymous"
        />

        <!-- Load necessary files-->
        <script src="./env.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

        <!-- for the small icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

        <!-- for the maps api -->
        <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    
        <script id="mapsAPI" defer></script>

        <script>
            document.getElementById("mapsAPI").src = `https://maps.googleapis.com/maps/api/js?key=${google_maps.api_key}&callback=initMap&v=weekly`
        </script>

        <title>Map Directions</title>
        <style type="text/css">
            /* Always set the map height explicitly to define the size of the div
            * element that contains the map. */
            #map {
                height: 100%;
                width: 70%;
                float: right;
            }

            #info {
                float: left;
            }

            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
        </style>

        <script>
            function initMap() {
                const directionsService = new google.maps.DirectionsService();
                const directionsRenderer = new google.maps.DirectionsRenderer();
                const lat = Number(`${default_location.lat}`);
                // console.log(lat);
                const lng = Number(`${default_location.lng}`);
                // console.log(lng);
                const map = new google.maps.Map(
                    document.getElementById("map"),
                    {
                        zoom: 15,
                        // change to user's current lat lng
                        center: { lat: lat, lng: lng },
                        // center: { lat: 1.29755, lng: 103.849412 },
                    }
                );
                directionsRenderer.setMap(map);

                calculateAndDisplayRoute(directionsService, directionsRenderer);
            }

            function calculateAndDisplayRoute(
                directionsService,
                directionsRenderer
            ) {
                directionsService.route(
                    {
                        origin: {
                            lat: 1.2907,
                            lng: 103.8517,
                        },
                        destination: {
                            lat: Number(vm.$data.venue_lat),
                            // lat: 1.29755,
                            lng: Number(vm.$data.venue_lng),
                            // lng: 103.849412,
                        },
                        travelMode: google.maps.TravelMode.WALKING,
                    },
                    (response, status) => {
                        if (status === "OK") {
                            directionsRenderer.setDirections(response);
                        } else {
                            window.alert(
                                "Directions request failed due to " + status
                            );
                        }
                    }
                );
            }
        </script>
    </head>
    <body>
        <div id="info" class="card d-inline" style="width: 30%">
            <img :src="photo" class="card-img-top" alt="venue_img" />
            <div class="card-body">
                <h5 class="card-title">{{name}}</h5>
                <h6 class="card-subtitle mb-2 text-muted" v-for="cat in categories">{{cat.name}}</h6>
                <!-- <span class="badge badge-pill badge-secondary" v-for="cat in categories">{{cat.name}}</span> -->
                <p class="card-text">
                    (no desc text available from foursquare)
                </p>
                <!-- <hr> -->
                <ul class="list-group list-group-flush">
                    
                    <li class="list-group-item">
                        <i class="fa fa-map-marker"></i>
                        {{ address }}
                    </li>
                    <li class="list-group-item">
                        <b>Price: </b>{{price.message}} 
                        <i class="fa fa-usd" v-for="num in price.tier">
                        </i>
                    </li>
                    <li class="list-group-item">
                        <a :href="foursq_url" target="_blank"> Foursquare Page </a>  
                    </li>
                  
                    <!-- <i class="fa fa-external-link"></i>  -->   
                </ul>
            </div>
        </div>
        <div id="map" class="d-inline position-fixed"></div>

        <script>
            const vm = new Vue({
                el: '#info',
                data: {
                    name: "",
                    address: "",
                    venue_lat: "",
                    venue_lng: "",
                    foursq_url: "",
                    price: {},
                    categories: [],
                    photo: "",
                },
                mounted: function (id) {
                    // axios.get(`https://api.foursquare.com/v2/venues/${id}?client_id=${foursquare.client_id}&client_secret=${foursquare.client_secret}&v=20201020`)
                    axios.get(`https://api.foursquare.com/v2/venues/58eb6ae461052829b6a3b7d9?client_id=${foursquare.client_id}&client_secret=${foursquare.client_secret}&v=20201020`)
                    .then(response => {
                        const venue = response.data.response.venue;
                        this.name = venue.name;
                        this.address = venue.location.address;
                        this.venue_lat = venue.location.lat;
                        this.venue_lng = venue.location.lng;
                        this.foursq_url = venue.canonicalUrl;
                        this.price = venue.price;
                        this.categories = venue.categories;
                        this.photo = venue.bestPhoto.prefix + 'cap300' + venue.bestPhoto.suffix;
                    })
                    .catch(error => alert(error));
                }
            });
        </script>

        <!-- Option 1: jQuery and Bootstrap Bundle (includes Popper) -->
        <script
            src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
            integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
